<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Banco Sem Filas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1><i class="fas fa-university"></i> BancoSemFilas</h1>
        <nav>
            <a href="/">Início</a>
            <a href="/marcação.html">Marcação</a>
            <a href="/login.html" class="nav-ativo">Login</a>
        </nav>
    </header>

    <div class="login-container">

        <div class="login-tipo-tabs">
            <button class="tab-btn tab-ativo" onclick="trocarTipo('cliente', this)">
                <i class="fas fa-user"></i> Cliente
            </button>
            <button class="tab-btn" onclick="trocarTipo('funcionario', this)">
                <i class="fas fa-user-tie"></i> Funcionário
            </button>
        </div>

        <!-- LOGIN CLIENTE -->
        <div id="form-cliente">
            <h2>Acesso do Cliente</h2>
            <p class="login-subtitulo">Entre para fazer ou gerir as suas marcações</p>
            <div class="input-grupo">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email-cliente" placeholder="O seu email">
            </div>
            <div class="input-grupo">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha-cliente" placeholder="A sua senha">
            </div>
            <p id="erro-cliente" class="erro-msg"></p>
            <button onclick="fazerLogin('cliente')">Entrar <i class="fas fa-arrow-right"></i></button>
            <p class="login-link">Não tem conta? <a href="/marcação.html">Faça uma marcação</a></p>
        </div>

        <!-- LOGIN FUNCIONÁRIO -->
        <div id="form-funcionario" style="display:none;">
            <h2>Acesso do Funcionário</h2>
            <p class="login-subtitulo">Área restrita para colaboradores bancários</p>
            <div class="input-grupo">
                <i class="fas fa-id-badge"></i>
                <input type="text" id="usuario-func" placeholder="ID de funcionário">
            </div>
            <div class="input-grupo">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha-func" placeholder="Senha de acesso">
            </div>
            <p id="erro-func" class="erro-msg"></p>
            <button onclick="fazerLogin('funcionario')">Entrar no Painel <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
        function trocarTipo(tipo, btn) {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("tab-ativo"));
            btn.classList.add("tab-ativo");
            document.getElementById("form-cliente").style.display     = tipo === "cliente"     ? "block" : "none";
            document.getElementById("form-funcionario").style.display = tipo === "funcionario" ? "block" : "none";
        }

        async function fazerLogin(tipo) {
            const erroEl = document.getElementById(`erro-${tipo === "cliente" ? "cliente" : "func"}`);
            erroEl.textContent = "";

            const body = tipo === "cliente"
                ? { tipo, email: document.getElementById("email-cliente").value,
                         senha: document.getElementById("senha-cliente").value }
                : { tipo: "funcionario",
                    username: document.getElementById("usuario-func").value,
                    senha:    document.getElementById("senha-func").value };

            try {
                const res  = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.ok) {
                    sessionStorage.setItem("tipoUsuario", data.tipo);
                    sessionStorage.setItem("nomeUsuario",  data.nome);
                    sessionStorage.setItem("userId",       data.id);
                    window.location.href = data.tipo === "funcionario" ? "/dashboard.html" : "/marcação.html";
                } else {
                    erroEl.textContent = data.erro;
                }
            } catch {
                erroEl.textContent = "Erro de ligação ao servidor.";
            }
        }

        // Enter para submeter
        document.addEventListener("keydown", e => {
            if (e.key === "Enter") {
                const tipo = document.getElementById("form-funcionario").style.display === "none"
                    ? "cliente" : "funcionario";
                fazerLogin(tipo);
            }
        });
    </script>
</body>
</html>
