<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcação Bancária</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="marcacao-container">

        <h1>Pré-Atendimento Bancário</h1>

        <form>
            <input type="text" placeholder="Nome Completo" required>

<input type="text" placeholder="Número do BI" required>

<input type="tel" placeholder="Telefone" required>

<input type="email" placeholder="Email" required>

            <select>
                <option>Escolha o Serviço</option>
                <option>Abertura de Conta</option>
                <option>Levantamento de Cartão</option>
                <option>Depósito</option>
                <option>Transferência</option>
                <option>Crédito Bancário</option>
            </select>

            <input type="text" placeholder="Digite sua agência">

            <input type="date">

            <select id="horario">

    <option value="">Escolha um horário</option>

    <option>08:00</option>
    <option>09:00</option>
    <option>10:00</option>
    <option>11:00</option>
    <option>12:00</option>

</select>

            <button type="submit">
                Fazer Marcação
            </button>
            <p id="senha-gerada"></p>

        </form>

    </div>

<script src="index.html/testes.js/horarios.js"></script>

</body>
</html>
