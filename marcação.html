<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcação - Banco Sem Filas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><i class="fas fa-university"></i> BancoSemFilas</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="marcação.html" class="nav-ativo">Marcação</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="marcacao-container">

        <h1><i class="fas fa-calendar-check"></i> Pré-Atendimento Bancário</h1>
        <p class="marcacao-subtitulo">Preencha os dados abaixo para garantir o seu lugar sem filas</p>

        <form id="form-marcacao">

            <div class="form-grupo">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: Délcio Stefan Fábio e Braúlio" required>
            </div>

            <div class="form-row">
                <div class="form-grupo">
                    <label>Número do BI</label>
                    <input type="text" id="bi" placeholder="Ex: 008665412LA048" required>
                </div>
                <div class="form-grupo">
                    <label>Telefone</label>
                    <input type="tel" id="telefone" placeholder="Ex: 928171905" required>
                </div>
            </div>

            <div class="form-grupo">
                <label>Email</label>
                <input type="email" id="email" placeholder="Ex: délciostefanfábiobráulio2026@email.com" required>
            </div>

            <div class="form-row">
                <div class="form-grupo">
                    <label>Banco</label>
                    <select id="banco" required>
                        <option value="">Escolha o Banco</option>
                        <option>BFA</option>
                        <option>BAI</option>
                        <option>Atlântico</option>
                        <option>Banco Económico</option>
                        <option>Banco Sol</option>
                        <option>Banco Keve</option>
                        <option>Banco Yetu</option>
                        <option>BPC</option>
                        <option>Banco Prestígio</option>
                        <option>Banco Valor</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label>Agência</label>
                    <select id="agencia" required>
                        <option value="">Escolha a Agência</option>
                        <option>Talatona</option>
                        <option>Maianga</option>
                        <option>Mutamba</option>
                        <option>Kilamba</option>
                        <option>Viana</option>
                        <option>Cacuaco</option>
                        <option>Benfica</option>
                        <option>Samba</option>
                        <option>Ingombota</option>
                        <option>Rocha Pinto</option>
                    </select>
                </div>
            </div>

            <div class="form-grupo">
                <label>Serviço</label>
                <select id="servico" required>
                    <option value="">Escolha o Serviço</option>
                    <option>Abertura de Conta</option>
                    <option>Levantamento de Cartão</option>
                    <option>Depósito</option>
                    <option>Transferência</option>
                    <option>Crédito Bancário</option>
                    <option>Pedido de Cartão</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-grupo">
                    <label>Data</label>
                    <input type="date" id="data" required>
                </div>
                <div class="form-grupo">
                    <label>Horário</label>
                    <select id="horario" required>
                        <option value="">Escolha um horário</option>
                        <option>08:00</option>
                        <option>09:00</option>
                        <option>10:00</option>
                        <option>11:00</option>
                        <option>12:00</option>
                        <option>14:00</option>
                        <option>15:00</option>
                        <option>16:00</option>
                    </select>
                </div>
            </div>

            <p id="erro-marcacao" class="erro-msg"></p>

            <button type="submit"><i class="fas fa-check-circle"></i> Confirmar Marcação</button>

        </form>

        <!-- Cartão de senha gerada -->
        <div id="cartao-senha" style="display:none;">
            <div class="senha-card">
                <i class="fas fa-ticket-alt senha-icone"></i>
                <h2>Marcação Confirmada!</h2>
                <div class="senha-numero" id="senha-display"></div>
                <div class="senha-detalhes" id="senha-detalhes"></div>
                <button onclick="novaMarcacao()"><i class="fas fa-plus"></i> Nova Marcação</button>
            </div>
        </div>

    </div>

    <script>
        const horariosOcupados = ["09:00", "11:00"];
        let contador = parseInt(localStorage.getItem("contadorSenha") || "1");

        // Define data mínima como hoje
        document.getElementById("data").min = new Date().toISOString().split("T")[0];

        document.getElementById("form-marcacao").addEventListener("submit", function(event) {
            event.preventDefault();

            const nome     = document.getElementById("nome").value.trim();
            const bi       = document.getElementById("bi").value.trim();
            const telefone = document.getElementById("telefone").value.trim();
            const email    = document.getElementById("email").value.trim();
            const banco    = document.getElementById("banco").value;
            const agencia  = document.getElementById("agencia").value;
            const servico  = document.getElementById("servico").value;
            const data     = document.getElementById("data").value;
            const horario  = document.getElementById("horario").value;
            const erro     = document.getElementById("erro-marcacao");

            // Validação
            if (!nome || !bi || !telefone || !email || !banco || !agencia || !servico || !data || !horario) {
                erro.textContent = "Por favor, preencha todos os campos.";
                return;
            }

            if (horariosOcupados.includes(horario)) {
                erro.textContent = "Este horário está indisponível. Escolha outro.";
                document.getElementById("horario").style.borderColor = "red";
                return;
            }

            erro.textContent = "";

            // Gera senha
            const senha = "A" + String(contador).padStart(3, "0");
            contador++;
            localStorage.setItem("contadorSenha", contador);

            // Guarda marcação no localStorage para o dashboard
            const marcacoes = JSON.parse(localStorage.getItem("marcacoes") || "[]");
            marcacoes.push({ senha, nome, servico, banco, agencia, horario, data, estado: "Aguardar" });
            localStorage.setItem("marcacoes", JSON.stringify(marcacoes));

            // Formata data
            const dataFormatada = new Date(data + "T00:00:00").toLocaleDateString("pt-AO", {
                weekday: "long", day: "2-digit", month: "long", year: "numeric"
            });

            // Mostra cartão de senha
            document.getElementById("form-marcacao").style.display = "none";
            document.getElementById("cartao-senha").style.display = "block";
            document.getElementById("senha-display").textContent = senha;
            document.getElementById("senha-detalhes").innerHTML = `
                <p><i class="fas fa-user"></i> <strong>${nome}</strong></p>
                <p><i class="fas fa-concierge-bell"></i> ${servico}</p>
                <p><i class="fas fa-university"></i> ${banco} — ${agencia}</p>
                <p><i class="fas fa-calendar"></i> ${dataFormatada}</p>
                <p><i class="fas fa-clock"></i> ${horario}</p>
            `;
        });

        function novaMarcacao() {
            document.getElementById("form-marcacao").reset();
            document.getElementById("form-marcacao").style.display = "flex";
            document.getElementById("cartao-senha").style.display = "none";
        }
    </script>

</body>
</html>
