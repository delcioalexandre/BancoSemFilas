<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Banco Sem Filas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><i class="fas fa-university"></i> BancoSemFilas</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="marcação.html">Nova Marcação</a>
            <span class="nav-utilizador"><i class="fas fa-user-tie"></i> <span id="nome-func">Funcionário</span></span>
            <a href="login.html" class="nav-sair"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </nav>
    </header>

    <div class="dashboard">

        <div class="dashboard-topo">
            <div>
                <h1>Painel Administrativo</h1>
                <p class="dashboard-data" id="data-hoje"></p>
            </div>
        </div>

        <!-- Cartões de estatística -->
        <div class="cards">
            <div class="card card-azul">
                <div class="card-icone"><i class="fas fa-users"></i></div>
                <div>
                    <h2>Clientes Hoje</h2>
                    <p id="total-clientes">0</p>
                </div>
            </div>
            <div class="card card-verde">
                <div class="card-icone"><i class="fas fa-ticket-alt"></i></div>
                <div>
                    <h2>Senhas Emitidas</h2>
                    <p id="total-senhas">0</p>
                </div>
            </div>
            <div class="card card-laranja">
                <div class="card-icone"><i class="fas fa-clock"></i></div>
                <div>
                    <h2>A Aguardar</h2>
                    <p id="total-aguardar">0</p>
                </div>
            </div>
            <div class="card card-roxo">
                <div class="card-icone"><i class="fas fa-check-circle"></i></div>
                <div>
                    <h2>Atendidos</h2>
                    <p id="total-atendidos">0</p>
                </div>
            </div>
        </div>

        <!-- Tabela de marcações -->
        <div class="tabela-secao">
            <div class="tabela-header">
                <h2><i class="fas fa-list-alt"></i> Marcações do Dia</h2>
                <div class="tabela-filtros">
                    <input type="text" id="pesquisa" placeholder="Pesquisar cliente..." oninput="filtrarTabela()">
                    <select id="filtro-estado" onchange="filtrarTabela()">
                        <option value="">Todos os estados</option>
                        <option value="Aguardar">A Aguardar</option>
                        <option value="Atendido">Atendido</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>
            </div>

            <div class="tabela-wrapper">
                <table id="tabela-marcacoes">
                    <thead>
                        <tr>
                            <th>Senha</th>
                            <th>Cliente</th>
                            <th>Serviço</th>
                            <th>Banco / Agência</th>
                            <th>Horário</th>
                            <th>Estado</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela">
                        <!-- Preenchido por JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Dados fictícios + dados reais do localStorage
        const dadosFicticios = [
            { senha: "A001", nome: "Ana Luísa Ferreira",   servico: "Abertura de Conta",    banco: "BAI",       agencia: "Talatona",   horario: "08:00", data: "2025-06-11", estado: "Atendido"  },
            { senha: "A002", nome: "Carlos Mendes Silva",  servico: "Transferência",         banco: "BFA",       agencia: "Maianga",    horario: "08:00", data: "2025-06-11", estado: "Atendido"  },
            { senha: "A003", nome: "Maria João Baptista",  servico: "Pedido de Cartão",      banco: "Atlântico", agencia: "Mutamba",    horario: "09:00", data: "2025-06-11", estado: "Atendido"  },
            { senha: "A004", nome: "Pedro Domingos Lopes", servico: "Crédito Bancário",      banco: "BPC",       agencia: "Kilamba",    horario: "10:00", data: "2025-06-11", estado: "Aguardar"  },
            { senha: "A005", nome: "Sofia Nunes Cardoso",  servico: "Depósito",              banco: "Banco Sol", agencia: "Viana",      horario: "10:00", data: "2025-06-11", estado: "Aguardar"  },
            { senha: "A006", nome: "António Sebastião",    servico: "Levantamento de Cartão",banco: "BAI",       agencia: "Cacuaco",    horario: "11:00", data: "2025-06-11", estado: "Aguardar"  },
            { senha: "A007", nome: "Filomena Teixeira",    servico: "Abertura de Conta",     banco: "BFA",       agencia: "Benfica",    horario: "12:00", data: "2025-06-11", estado: "Cancelado" },
            { senha: "A008", nome: "Ricardo Caetano Lima", servico: "Transferência",         banco: "Atlântico", agencia: "Samba",      horario: "14:00", data: "2025-06-11", estado: "Aguardar"  },
            { senha: "A009", nome: "Esperança Mateus",     servico: "Pedido de Cartão",      banco: "Banco Keve",agencia: "Ingombota",  horario: "15:00", data: "2025-06-11", estado: "Aguardar"  },
            { senha: "A010", nome: "Domingos Vieira Paulo",servico: "Crédito Bancário",      banco: "Banco Yetu",agencia: "Rocha Pinto",horario: "16:00", data: "2025-06-11", estado: "Aguardar"  },
        ];

        // Combina dados fictícios com marcações reais feitas pelo utilizador
        const marcacoesReais = JSON.parse(localStorage.getItem("marcacoes") || "[]");
        let todasMarcacoes = [...dadosFicticios, ...marcacoesReais];
        let marcacoesFiltradas = [...todasMarcacoes];

        // Data de hoje
        document.getElementById("data-hoje").textContent = new Date().toLocaleDateString("pt-AO", {
            weekday: "long", day: "2-digit", month: "long", year: "numeric"
        });

        function atualizarEstatisticas() {
            const total     = todasMarcacoes.length;
            const aguardar  = todasMarcacoes.filter(m => m.estado === "Aguardar").length;
            const atendidos = todasMarcacoes.filter(m => m.estado === "Atendido").length;

            document.getElementById("total-clientes").textContent  = total;
            document.getElementById("total-senhas").textContent    = total;
            document.getElementById("total-aguardar").textContent  = aguardar;
            document.getElementById("total-atendidos").textContent = atendidos;
        }

        function corEstado(estado) {
            if (estado === "Atendido")  return "badge-verde";
            if (estado === "Cancelado") return "badge-vermelho";
            return "badge-laranja";
        }

        function renderizarTabela(lista) {
            const corpo = document.getElementById("corpo-tabela");
            if (lista.length === 0) {
                corpo.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:#999;">Nenhuma marcação encontrada</td></tr>`;
                return;
            }
            corpo.innerHTML = lista.map((m, i) => `
                <tr>
                    <td><span class="senha-badge">${m.senha}</span></td>
                    <td>${m.nome}</td>
                    <td>${m.servico}</td>
                    <td>${m.banco}<br><small style="color:#888">${m.agencia}</small></td>
                    <td><i class="fas fa-clock" style="color:#007bff"></i> ${m.horario}</td>
                    <td><span class="badge ${corEstado(m.estado)}">${m.estado}</span></td>
                    <td>
                        <select class="acao-select" onchange="mudarEstado(this, '${m.senha}')">
                            <option value="Aguardar"  ${m.estado==="Aguardar"  ? "selected" : ""}>Aguardar</option>
                            <option value="Atendido"  ${m.estado==="Atendido"  ? "selected" : ""}>Atendido</option>
                            <option value="Cancelado" ${m.estado==="Cancelado" ? "selected" : ""}>Cancelado</option>
                        </select>
                    </td>
                </tr>
            `).join("");
        }

        function mudarEstado(select, senha) {
            const idx = todasMarcacoes.findIndex(m => m.senha === senha);
            if (idx !== -1) {
                todasMarcacoes[idx].estado = select.value;
                atualizarEstatisticas();
                filtrarTabela();
            }
        }

        function filtrarTabela() {
            const pesquisa = document.getElementById("pesquisa").value.toLowerCase();
            const estado   = document.getElementById("filtro-estado").value;

            marcacoesFiltradas = todasMarcacoes.filter(m => {
                const coincideNome   = m.nome.toLowerCase().includes(pesquisa) || m.senha.toLowerCase().includes(pesquisa);
                const coincideEstado = !estado || m.estado === estado;
                return coincideNome && coincideEstado;
            });

            renderizarTabela(marcacoesFiltradas);
        }

        // Inicializa
        atualizarEstatisticas();
        renderizarTabela(todasMarcacoes);
    </script>

</body>
</html>
